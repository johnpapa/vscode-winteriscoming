name: CI

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'images/**'
      - 'LICENSE.md'
      - '.gitignore'
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'images/**'
      - 'LICENSE.md'
      - '.gitignore'

permissions:
  contents: read

jobs:
  package:
    name: Package Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npx @vscode/vsce package --no-dependencies
